<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LoanApp</title>
    <link rel="stylesheet" href="/loanapp/css/style.css">
</head>
<body>

    <div class="auth-wrap">
        <div class="auth-card">
            <h1>Sign In</h1>
            <p class="auth-subtitle">No account? <a href="register.html">Register here</a></p>

            <div id="msg"></div>

            <form action="/loanapp/php/auth/login.php" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>
        </div>
    </div>

    <script src="/loanapp/js/login.js"></script>
</body>
</html>
